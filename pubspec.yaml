name: banquet_catering_app
description: Banquet & Catering App — plan events, curate menus, manage catering bookings end-to-end.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend
  supabase_flutter: ^2.5.6

  # Navigation
  go_router: ^14.2.0

  # UI / aesthetics
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  skeletonizer: ^2.1.3
  phosphor_flutter: ^2.1.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Formatting / i18n
  intl: ^0.19.0
  timeago: ^3.6.1

  # Persistence
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Admin — image pick + compress
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Payments (wired in Phase 6)
  razorpay_flutter: ^1.3.7

  # Utility
  http: ^1.2.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
